name: CI MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # Diubah menjadi data_train.csv karena kita akan mengeksekusi langsung dari dalam folder modelling
  CSV_URL: "data_train.csv"
  TARGET_VAR: "average_rating"
  ALPHA: 0.5
  L1_RATIO: 0.5
  RANDOM_STATE: 42

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Mengunduh source code dari repositori GitHub ke runner
      - uses: actions/checkout@v3

      # 2. Mengonfigurasi lingkungan Python versi 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      # 3. Verifikasi Environment Variables untuk memastikan konfigurasi terbaca
      - name: Check Env
        run: |
          echo "CSV URL: $CSV_URL"
          echo "Target Variable: $TARGET_VAR"

      # 4. Menginstal MLflow beserta library machine learning yang dibutuhkan
      # Catatan: Lebih disarankan install menggunakan requirements.txt yang sudah ada di folder modelling
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f modelling/requirements.txt ]; then pip install -r modelling/requirements.txt; fi
          pip install mlflow pandas scikit-learn openpyxl  # fallback / library tambahan jika belum ada di requirements

      # 5. Mengeksekusi project MLflow dengan working-directory di dalam folder modelling
      - name: Run mlflow project
        working-directory: ./modelling
        run: |
          python train.py
